name: Shopping Cart CI

# SADECE develop branch'ine yapılan push'larda tetiklenir
on:
  push:
    branches: [ "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    # EKSTRA KAPI: Linting/Formatting kontrolü
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # OTOMATİK TEST: test_cart.py dosyasını çalıştırır
    - name: Run Tests
      run: |
        python -m unittest test_cart.py
